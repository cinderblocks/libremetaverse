name: Release

on:
  push:
    # Run this workflow when a tag is pushed (e.g. `v1.2.3`).
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to release (e.g. 2.5.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: write
  actions: read

jobs:
  build-and-publish:
    runs-on: windows-2022
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      LMVTESTAGENTUSERNAME: ${{ secrets.LMVTESTAGENTUSERNAME }}
      LMVTESTAGENTPASSWORD: ${{ secrets.LMVTESTAGENTPASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $raw = if ('${{ inputs.version }}') { '${{ inputs.version }}' } else { '${{ github.ref_name }}' }
          $v = $raw -replace '^v',''
          Write-Host "Package version: $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        shell: pwsh
        run: dotnet restore

      - name: Build
        shell: pwsh
        run: dotnet build --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          # Run tests but skip integration/network tests on GitHub hosted runners
          dotnet test LibreMetaverse.sln --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx" --filter "Category!=RequiresLiveServer" --verbosity normal

      - name: Test (Live Server)
        if: env.LMVTESTAGENTUSERNAME != ''
        continue-on-error: true
        shell: pwsh
        run: |
          # Run live-server tests (RequiresLiveServer) when agent credentials are available.
          # continue-on-error is set so transient grid issues do not block the release.
          dotnet test LibreMetaverse.sln --configuration Release --no-build --logger "trx;LogFileName=TestResults.LiveServer.trx" --filter "Category=RequiresLiveServer" --verbosity normal

      - name: Publish test results (annotations)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests
          reporter: dotnet-trx
          path: '**/*.trx'
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults
            **/*.trx
            **/coverage*.xml

      - name: Pack LibreMetaverse libraries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path ./artifacts -Force | Out-Null
          dotnet pack LibreMetaverse.sln --configuration Release --no-build --output ./artifacts /p:PackageVersion="${{ steps.version.outputs.version }}"

      - name: List artifacts
        shell: pwsh
        run: |
          if (Test-Path ./artifacts) {
            Get-ChildItem -Path ./artifacts -Force
          } else {
            Write-Host "No artifacts found"
          }

      - name: Create zipped archives
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path ./release_artifacts -Force | Out-Null
          # nuget nupkg
          $nupkgs = Get-ChildItem -Path ./artifacts -Filter *.nupkg -File -ErrorAction SilentlyContinue
          if ($nupkgs) {
            Compress-Archive -Path ($nupkgs | ForEach-Object { $_.FullName }) -DestinationPath ./release_artifacts/nuget_libraries.zip -Force
          }
          # symbol packages (snupkg)
          $snupkgs = Get-ChildItem -Path ./artifacts -Filter *.snupkg -File -ErrorAction SilentlyContinue
          if ($snupkgs) {
            Compress-Archive -Path ($snupkgs | ForEach-Object { $_.FullName }) -DestinationPath ./release_artifacts/nuget_libraries_symbols.zip -Force
          }

      - name: Publish to NuGet.org
        if: env.NUGET_API_KEY != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packages = Get-ChildItem -Path ./artifacts\* -Include *.nupkg,*.snupkg -File -ErrorAction SilentlyContinue
          if ($packages) {
            foreach ($p in $packages) {
              $pkg = $p.FullName
              Write-Host "Publishing $pkg to nuget.org"
              try {
                dotnet nuget push $pkg --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
              } catch {
                Write-Host "Failed to push ${pkg}: $($_)"
              }
            }
          } else {
            Write-Host "No packages to publish"
          }

      - name: Generate release notes
        id: gen_notes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $CURRENT_TAG = "v${{ steps.version.outputs.version }}"

          # Find previous tag by creation date excluding the current tag
          $PREV_TAG = git for-each-ref --sort=-creatordate --format '%(refname:short)' refs/tags | Where-Object { $_ -ne $CURRENT_TAG } | Select-Object -First 1

          Write-Host "Generating release notes for $CURRENT_TAG (previous: $PREV_TAG)"

          $NOTES_FILE = 'release_notes.md'
          "# Release $CURRENT_TAG" | Out-File -FilePath $NOTES_FILE -Encoding utf8
          "" | Out-File -FilePath $NOTES_FILE -Append

          if ($PREV_TAG) {
            "## Changes since $PREV_TAG" | Out-File -FilePath $NOTES_FILE -Append
            "" | Out-File -FilePath $NOTES_FILE -Append
            git log --no-merges --pretty=format:'- %s (%an)' "$PREV_TAG..$CURRENT_TAG" | Out-File -FilePath $NOTES_FILE -Append
          } else {
            "## Changes" | Out-File -FilePath $NOTES_FILE -Append
            "" | Out-File -FilePath $NOTES_FILE -Append
            git log --no-merges --pretty=format:'- %s (%an)' "$CURRENT_TAG" | Out-File -FilePath $NOTES_FILE -Append
          }

          "" | Out-File -FilePath $NOTES_FILE -Append
          "### Packages" | Out-File -FilePath $NOTES_FILE -Append
          "" | Out-File -FilePath $NOTES_FILE -Append
          Get-ChildItem -Path ./artifacts -Filter *.nupkg -File -ErrorAction SilentlyContinue | ForEach-Object { "- $($_.Name)" | Out-File -FilePath $NOTES_FILE -Append }

      - name: Create GitHub release and upload packages
        uses: ncipollo/release-action@v1
        id: create_release
        with:
          tag: v${{ steps.version.outputs.version }}
          allowUpdates: true
          artifacts: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
            ./release_artifacts/*.zip
          bodyFile: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
